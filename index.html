<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanto Pokedex</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="logo">
    <div class="pokeball-icon"></div>
    <h1>Kanto Pokédex</h1>
  </div>
  <p>Gotta catch 'em all! — 151 original Pokemon</p>
  <div class="controls">
    <input id="search" type="search" placeholder="Search by name…" autocomplete="off" />
    <input id="num-filter" type="number" min="1" max="151" placeholder="# 1–151" />
    <select id="type-filter">
      <option value="">All Types</option>
    </select>
  </div>
</header>

<main>
  <div id="count"></div>
  <div id="loading">
    <div class="spinner"></div>
    Loading Pokémon…
  </div>
  <div id="grid"></div>
</main>

<!-- Detail Modal -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal">
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  // ── Type colours ──────────────────────────────────────────────
  const TYPE_COLORS = {
    normal: '#A8A878',   fire: '#F08030',    water: '#6890F0',
    electric: '#F8D030', grass: '#78C850',   ice: '#98D8D8',
    fighting: '#C03028', poison: '#A040A0',  ground: '#E0C068',
    flying: '#A890F0',   psychic: '#F85888', bug: '#A8B820',
    rock: '#B8A038',     ghost: '#705898',   dragon: '#7038F8',
    dark: '#705848',     steel: '#B8B8D0',   fairy: '#EE99AC'
  };

  const STAT_LABELS = {
    hp: 'HP', attack: 'Attack', defense: 'Defense',
    'special-attack': 'Sp. Atk', 'special-defense': 'Sp. Def', speed: 'Speed'
  };

  function statColor(v) {
    if (v >= 100) return '#4caf50';
    if (v >= 70)  return '#8bc34a';
    if (v >= 45)  return '#ffc107';
    return '#f44336';
  }

  // ── State ─────────────────────────────────────────────────────
  let allPokemon = [];
  const detailCache = {};

  // ── Fetch all 151 Kanto Pokemon ───────────────────────────────
  async function loadKanto() {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151&offset=0');
    const data = await res.json();

    const fetchOne = async (p) => {
      const r = await fetch(p.url);
      const d = await r.json();
      return {
        id: d.id,
        name: d.name,
        types: d.types.map(t => t.type.name),
        sprite: d.sprites.other['official-artwork'].front_default || d.sprites.front_default
      };
    };

    // Fetch in batches of 30
    const results = data.results;
    const batchSize = 30;
    const batchResults = [];
    for (let i = 0; i < results.length; i += batchSize) {
      const batch = await Promise.all(results.slice(i, i + batchSize).map(fetchOne));
      batchResults.push(...batch);
    }

    allPokemon = batchResults.sort((a, b) => a.id - b.id);

    // Populate type filter
    const allTypes = [...new Set(allPokemon.flatMap(p => p.types))].sort();
    const sel = document.getElementById('type-filter');
    allTypes.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t.charAt(0).toUpperCase() + t.slice(1);
      sel.appendChild(opt);
    });

    document.getElementById('loading').style.display = 'none';
    renderGrid(allPokemon);
  }

  // ── Render grid ───────────────────────────────────────────────
  function renderGrid(list) {
    const grid = document.getElementById('grid');
    document.getElementById('count').textContent = `Showing ${list.length} Pokémon`;
    grid.innerHTML = '';

    list.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.background = `linear-gradient(145deg, ${TYPE_COLORS[p.types[0]]}22, #fff 60%)`;
      card.innerHTML = `
        <span class="card-num">#${String(p.id).padStart(3, '0')}</span>
        <img src="${p.sprite}" alt="${p.name}" loading="lazy" />
        <div class="card-name">${p.name}</div>
        <div class="types">
          ${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t] || '#aaa'}">${t}</span>`).join('')}
        </div>`;
      card.addEventListener('click', () => openModal(p.id));
      grid.appendChild(card);
    });
  }

  // ── Filter logic ──────────────────────────────────────────────
  function getFiltered() {
    const q    = document.getElementById('search').value.trim().toLowerCase();
    const type = document.getElementById('type-filter').value;
    const num  = document.getElementById('num-filter').value.trim();
    return allPokemon.filter(p =>
      (!q    || p.name.includes(q)) &&
      (!num  || p.id === Number(num)) &&
      (!type || p.types.includes(type))
    );
  }

  document.getElementById('search').addEventListener('input', () => renderGrid(getFiltered()));
  document.getElementById('num-filter').addEventListener('input', () => renderGrid(getFiltered()));
  document.getElementById('type-filter').addEventListener('change', () => renderGrid(getFiltered()));

  // ── Modal ─────────────────────────────────────────────────────
  async function openModal(id) {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.add('open');
    document.getElementById('modal-header').innerHTML = '<div class="spinner"></div>';
    document.getElementById('modal-body').innerHTML = '';

    if (!detailCache[id]) {
      const [pRes, sRes] = await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
      ]);
      detailCache[id] = { pokemon: await pRes.json(), species: await sRes.json() };
    }

    const { pokemon: p, species: s } = detailCache[id];
    const flavorEntry = s.flavor_text_entries.find(e => e.language.name === 'en');
    const flavor = flavorEntry ? flavorEntry.flavor_text.replace(/\f/g, ' ') : '';
    const bg = TYPE_COLORS[p.types[0].type.name] || '#888';

    document.getElementById('modal-header').innerHTML = `
      <img src="${p.sprites.other['official-artwork'].front_default || p.sprites.front_default}" alt="${p.name}" />
      <div class="modal-title">
        <div class="modal-num">#${String(p.id).padStart(3, '0')}</div>
        <h2>${p.name}</h2>
        <div class="types" style="margin-top:6px">
          ${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t.type.name] || '#aaa'}">${t.type.name}</span>`).join('')}
        </div>
      </div>`;
    document.getElementById('modal-header').style.background = `linear-gradient(135deg, ${bg}44, #fff)`;

    const statsHtml = p.stats.map(st => {
      const label = STAT_LABELS[st.stat.name] || st.stat.name;
      const val = st.base_stat;
      const pct = Math.min(100, Math.round((val / 255) * 100));
      return `
        <div class="stat-row">
          <span class="stat-label">${label}</span>
          <div class="stat-bar-bg">
            <div class="stat-bar" style="width:${pct}%;background:${statColor(val)}"></div>
          </div>
          <span class="stat-val">${val}</span>
        </div>`;
    }).join('');

    const abilities = p.abilities.map(a =>
      `<span class="ability-badge">${a.ability.name.replace('-', ' ')}${a.is_hidden ? ' (hidden)' : ''}</span>`
    ).join('');

    document.getElementById('modal-body').innerHTML = `
      ${flavor ? `<div class="modal-section"><p style="font-style:italic;color:#555;font-size:0.9rem">"${flavor}"</p></div>` : ''}
      <div class="modal-section">
        <h3>Info</h3>
        <div class="info-row">
          <div class="info-item">Height: ${(p.height / 10).toFixed(1)} m</div>
          <div class="info-item">Weight: ${(p.weight / 10).toFixed(1)} kg</div>
          <div class="info-item">Base XP: ${p.base_experience ?? '—'}</div>
        </div>
      </div>
      <div class="modal-section">
        <h3>Abilities</h3>
        <div class="abilities-list">${abilities}</div>
      </div>
      <div class="modal-section">
        <h3>Base Stats</h3>
        ${statsHtml}
      </div>
      <button class="modal-close" id="close-btn">Close</button>`;

    document.getElementById('close-btn').addEventListener('click', closeModal);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Boot ──────────────────────────────────────────────────────
  loadKanto().catch(err => {
    document.getElementById('loading').innerHTML =
      `<p style="color:#e33">Failed to load Pokémon data.<br>Please check your internet connection and refresh.</p>`;
    console.error(err);
  });
</script>

</body>
</html>
