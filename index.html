<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanto Pokedex</title>
  <style>
    :root {
      --bg: #f0f4ff;
      --card-bg: #ffffff;
      --red: #e3350d;
      --yellow: #ffcb05;
      --blue: #3d7dca;
      --shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--red);
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pokeball-icon {
      width: 48px; height: 48px;
      background: conic-gradient(#fff 0deg 180deg, #e3350d 180deg 360deg);
      border-radius: 50%;
      border: 3px solid #222;
      position: relative;
      flex-shrink: 0;
    }
    .pokeball-icon::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      border: 3px solid #222;
    }

    header h1 {
      color: var(--yellow);
      font-size: 2rem;
      font-weight: 900;
      text-shadow: 2px 2px 0 #222;
      letter-spacing: 1px;
    }

    header p {
      color: #ffe;
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 700px;
    }

    #search {
      flex: 1;
      min-width: 180px;
      padding: 10px 16px;
      border-radius: 30px;
      border: none;
      font-size: 1rem;
      outline: none;
      box-shadow: var(--shadow);
    }

    #num-filter {
      width: 110px;
      padding: 10px 16px;
      border-radius: 30px;
      border: none;
      font-size: 1rem;
      outline: none;
      box-shadow: var(--shadow);
    }
    #num-filter::-webkit-inner-spin-button,
    #num-filter::-webkit-outer-spin-button { -webkit-appearance: none; }

    #type-filter {
      padding: 10px 14px;
      border-radius: 30px;
      border: none;
      font-size: 0.95rem;
      background: #fff;
      cursor: pointer;
      box-shadow: var(--shadow);
      outline: none;
    }

    /* ── Grid ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    #count {
      text-align: center;
      color: #555;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px 12px 12px;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .card-num {
      position: absolute;
      top: 8px; left: 10px;
      font-size: 0.72rem;
      color: #aaa;
      font-weight: 700;
    }

    .card img {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .card-name {
      text-transform: capitalize;
      font-weight: 700;
      font-size: 1rem;
      margin: 6px 0 8px;
      color: #222;
    }

    .types {
      display: flex;
      justify-content: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .type-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      text-transform: capitalize;
      letter-spacing: 0.5px;
    }

    /* ── Loading / Error ── */
    #loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.1rem;
      color: #555;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #ddd;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #fff;
      border-radius: 24px;
      max-width: 480px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.3);
      animation: pop 0.2s ease;
    }
    @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-header {
      padding: 24px 24px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .modal-header img {
      width: 120px;
      height: 120px;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .modal-title h2 {
      text-transform: capitalize;
      font-size: 1.6rem;
      font-weight: 900;
      color: #222;
    }
    .modal-title .modal-num {
      color: #aaa;
      font-size: 1rem;
      font-weight: 600;
    }

    .modal-body {
      padding: 0 24px 24px;
    }

    .modal-section {
      margin-bottom: 14px;
    }

    .modal-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 6px;
    }

    .info-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .info-item {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #333;
    }

    .abilities-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ability-badge {
      background: #f0f4ff;
      border: 1.5px solid #c5d0e8;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: capitalize;
      color: #3d5a99;
    }

    /* Stats */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .stat-label {
      width: 90px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: capitalize;
      color: #555;
      flex-shrink: 0;
    }
    .stat-bar-bg {
      flex: 1;
      background: #eee;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
    }
    .stat-val {
      width: 32px;
      text-align: right;
      font-size: 0.82rem;
      font-weight: 700;
      color: #333;
    }

    .modal-close {
      display: block;
      margin: 0 auto;
      padding: 10px 32px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(227,53,13,0.4);
      transition: background 0.15s;
    }
    .modal-close:hover { background: #c0290c; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header h1 { font-size: 1.4rem; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="pokeball-icon"></div>
    <h1>Kanto Pokédex</h1>
  </div>
  <p>Gotta catch 'em all! — 151 original Pokemon</p>
  <div class="controls">
    <input id="search" type="search" placeholder="Search by name…" autocomplete="off" />
    <input id="num-filter" type="number" min="1" max="151" placeholder="# 1–151" />
    <select id="type-filter">
      <option value="">All Types</option>
    </select>
  </div>
</header>

<main>
  <div id="count"></div>
  <div id="loading">
    <div class="spinner"></div>
    Loading Pokémon…
  </div>
  <div id="grid"></div>
</main>

<!-- Detail Modal -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal">
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  // ── Type colours ──────────────────────────────────────────────
  const TYPE_COLORS = {
    normal:'#A8A878', fire:'#F08030', water:'#6890F0', electric:'#F8D030',
    grass:'#78C850', ice:'#98D8D8', fighting:'#C03028', poison:'#A040A0',
    ground:'#E0C068', flying:'#A890F0', psychic:'#F85888', bug:'#A8B820',
    rock:'#B8A038', ghost:'#705898', dragon:'#7038F8', dark:'#705848',
    steel:'#B8B8D0', fairy:'#EE99AC'
  };

  // Stat bar colours by value
  function statColor(v) {
    if (v >= 100) return '#4caf50';
    if (v >= 70)  return '#8bc34a';
    if (v >= 45)  return '#ffc107';
    return '#f44336';
  }

  const STAT_LABELS = {
    hp:'HP', attack:'Attack', defense:'Defense',
    'special-attack':'Sp. Atk', 'special-defense':'Sp. Def', speed:'Speed'
  };

  // ── State ─────────────────────────────────────────────────────
  let allPokemon = [];   // { id, name, types, sprite }
  const detailCache = {};

  // ── Fetch all 151 Kanto Pokemon ───────────────────────────────
  async function loadKanto() {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151&offset=0');
    const data = await res.json();

    // Fetch basic info in parallel (batches of 30 to be polite)
    const results = data.results;
    const batch = async (items) => {
      return Promise.all(items.map(async (p, i) => {
        const r = await fetch(p.url);
        const d = await r.json();
        return {
          id: d.id,
          name: d.name,
          types: d.types.map(t => t.type.name),
          sprite: d.sprites.other['official-artwork'].front_default
                  || d.sprites.front_default
        };
      }));
    };

    // Split into batches of 30
    const batchSize = 30;
    const batches = [];
    for (let i = 0; i < results.length; i += batchSize) {
      batches.push(results.slice(i, i + batchSize));
    }
    const batchResults = [];
    for (const b of batches) {
      batchResults.push(...(await batch(b)));
    }

    allPokemon = batchResults.sort((a, b) => a.id - b.id);

    // Populate type filter
    const allTypes = [...new Set(allPokemon.flatMap(p => p.types))].sort();
    const sel = document.getElementById('type-filter');
    allTypes.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t.charAt(0).toUpperCase() + t.slice(1);
      sel.appendChild(opt);
    });

    document.getElementById('loading').style.display = 'none';
    renderGrid(allPokemon);
  }

  // ── Render grid ───────────────────────────────────────────────
  function renderGrid(list) {
    const grid = document.getElementById('grid');
    const count = document.getElementById('count');
    count.textContent = `Showing ${list.length} Pokémon`;
    grid.innerHTML = '';
    list.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.background = `linear-gradient(145deg, ${TYPE_COLORS[p.types[0]]}22, #fff 60%)`;
      card.innerHTML = `
        <span class="card-num">#${String(p.id).padStart(3,'0')}</span>
        <img src="${p.sprite}" alt="${p.name}" loading="lazy" />
        <div class="card-name">${p.name}</div>
        <div class="types">
          ${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t]||'#aaa'}">${t}</span>`).join('')}
        </div>`;
      card.addEventListener('click', () => openModal(p.id));
      grid.appendChild(card);
    });
  }

  // ── Filter logic ──────────────────────────────────────────────
  function getFiltered() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const type = document.getElementById('type-filter').value;
    const num = document.getElementById('num-filter').value.trim();
    return allPokemon.filter(p =>
      (!q || p.name.includes(q)) &&
      (!num || p.id === Number(num)) &&
      (!type || p.types.includes(type))
    );
  }

  document.getElementById('search').addEventListener('input', () => renderGrid(getFiltered()));
  document.getElementById('num-filter').addEventListener('input', () => renderGrid(getFiltered()));
  document.getElementById('type-filter').addEventListener('change', () => renderGrid(getFiltered()));

  // ── Modal ─────────────────────────────────────────────────────
  async function openModal(id) {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.add('open');
    document.getElementById('modal-header').innerHTML = '<div class="spinner"></div>';
    document.getElementById('modal-body').innerHTML = '';

    if (!detailCache[id]) {
      const [pRes, sRes] = await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
      ]);
      detailCache[id] = {
        pokemon: await pRes.json(),
        species: await sRes.json()
      };
    }

    const { pokemon: p, species: s } = detailCache[id];

    // Flavour text (English)
    const flavorEntry = s.flavor_text_entries.find(e => e.language.name === 'en');
    const flavor = flavorEntry ? flavorEntry.flavor_text.replace(/\f/g, ' ') : '';

    // Background color from primary type
    const bg = TYPE_COLORS[p.types[0].type.name] || '#888';

    document.getElementById('modal-header').innerHTML = `
      <img src="${p.sprites.other['official-artwork'].front_default || p.sprites.front_default}" alt="${p.name}" />
      <div class="modal-title">
        <div class="modal-num">#${String(p.id).padStart(3,'0')}</div>
        <h2>${p.name}</h2>
        <div class="types" style="margin-top:6px">
          ${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t.type.name]||'#aaa'}">${t.type.name}</span>`).join('')}
        </div>
      </div>`;
    document.getElementById('modal-header').style.background = `linear-gradient(135deg, ${bg}44, #fff)`;

    // Stats
    const statsHtml = p.stats.map(st => {
      const label = STAT_LABELS[st.stat.name] || st.stat.name;
      const val = st.base_stat;
      const pct = Math.min(100, Math.round((val / 255) * 100));
      return `<div class="stat-row">
        <span class="stat-label">${label}</span>
        <div class="stat-bar-bg">
          <div class="stat-bar" style="width:${pct}%;background:${statColor(val)}"></div>
        </div>
        <span class="stat-val">${val}</span>
      </div>`;
    }).join('');

    const abilities = p.abilities.map(a =>
      `<span class="ability-badge">${a.ability.name.replace('-',' ')}${a.is_hidden?' (hidden)':''}</span>`
    ).join('');

    document.getElementById('modal-body').innerHTML = `
      ${flavor ? `<div class="modal-section"><p style="font-style:italic;color:#555;font-size:0.9rem">"${flavor}"</p></div>` : ''}
      <div class="modal-section">
        <h3>Info</h3>
        <div class="info-row">
          <div class="info-item">Height: ${(p.height / 10).toFixed(1)} m</div>
          <div class="info-item">Weight: ${(p.weight / 10).toFixed(1)} kg</div>
          <div class="info-item">Base XP: ${p.base_experience ?? '—'}</div>
        </div>
      </div>
      <div class="modal-section">
        <h3>Abilities</h3>
        <div class="abilities-list">${abilities}</div>
      </div>
      <div class="modal-section">
        <h3>Base Stats</h3>
        ${statsHtml}
      </div>
      <button class="modal-close" id="close-btn">Close</button>`;

    document.getElementById('close-btn').addEventListener('click', closeModal);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Boot ──────────────────────────────────────────────────────
  loadKanto().catch(err => {
    document.getElementById('loading').innerHTML =
      `<p style="color:#e33">Failed to load Pokémon data.<br>Please check your internet connection and refresh.</p>`;
    console.error(err);
  });
</script>
</body>
</html>
